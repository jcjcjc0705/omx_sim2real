# OMX FOLLOWER (OMX-F) profile — the framework's real target.
#
# to_sim (M1): reads /follower/joint_states and drives the Isaac twin (read-only
#   on the real arm). The follower is torque-ON and holds position, so to SEE the
#   twin move you must move the follower (e.g. run leader->follower teleop).
# to_real (M2, later): writes /follower/arm_controller/commands to MOVE the real
#   follower from the sim. That path moves real hardware (fake-driver verify first).

robot: omx_f
label: follower        # shown as the column name in dual_state_monitor
canonical_unit: rad

joints:
  - joint1
  - joint2
  - joint3
  - joint4
  - joint5
  - gripper_joint_1

endpoints:
  real:                                                 # physical follower, via omx_arm_image ros2_control
    kind: ros2_control
    unit: deg
    state_topic: /follower/joint_states                 # sensor_msgs/JointState (by name)
    command_topic: /follower/arm_controller/commands    # std_msgs/Float64MultiArray (by joints[] order)
    command_type: std_msgs/Float64MultiArray
    per_joint: {}

  sim:                                                  # Isaac Sim (omx_f USD), via ros2_bridge
    kind: ros2_jointstate
    unit: rad
    state_topic: /joint_states
    command_topic: /joint_command
    command_type: sensor_msgs/JointState
    asset: assets/omx_f.usd
    joint_alias: {}
    # Follower calibration (2026-07-23): same DYNAMIXEL ~180-deg center as the
    # leader -> offset -pi on every joint. Unlike the leader, the follower gripper
    # is the MIRROR-OPPOSITE of the leader's (teleop mirror uses signs [..,-1]),
    # so it needs sign +1 (the opposite of the leader gripper's -1). Net result:
    # all 6 follower joints are uniform (sign +1, offset -pi). Re-verify read-only
    # (to_sim) before to_real; fine-tune a joint's offset if its neutral is off.
    per_joint:
      joint1:          { sign: 1.0, offset: -3.14159265 }
      joint2:          { sign: 1.0, offset: -3.14159265 }
      joint3:          { sign: 1.0, offset: -3.14159265 }
      joint4:          { sign: 1.0, offset: -3.14159265 }
      joint5:          { sign: 1.0, offset: -3.14159265 }
      gripper_joint_1: { sign: 1.0, offset: -3.14159265 }

base:
  type: fixed
